<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" role="img" aria-labelledby="title desc">
  <title id="title">Compress locally workflow illustration</title>
  <desc id="desc">A simplified Mac display showing a padlock of privacy, with files passing through it.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f2f7f4"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#1a342b" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="560" rx="32" fill="url(#bg)"/>

  <!-- iMac/Mac Screen Bezel -->
  <g filter="url(#shadow)">
    <rect x="160" y="100" width="400" height="280" rx="24" fill="#ffffff" stroke="#1d2420" stroke-width="3"/>
    <!-- Screen Inner Display -->
    <rect x="175" y="115" width="370" height="220" rx="14" fill="#1d2420"/>
    <!-- Screen Stand -->
    <path d="M 335 380 L 325 435 H 395 L 385 380 Z" fill="#ffffff" stroke="#1d2420" stroke-width="3" stroke-linejoin="round"/>
    <!-- Screen Base -->
    <ellipse cx="360" cy="435" rx="65" ry="8" fill="#ffffff" stroke="#1d2420" stroke-width="3"/>
  </g>

  <!-- Inside Screen: Padlock (Secure Sandbox Symbol) -->
  <g transform="translate(360, 225)">
    <!-- Lock Shackle -->
    <path d="M -18 -10 V -28 C -18 -38, 18 -38, 18 -28 V -10" fill="none" stroke="#66c9a8" stroke-width="4" stroke-linecap="round"/>
    <!-- Lock Body -->
    <rect x="-30" y="-10" width="60" height="48" rx="10" fill="#66c9a8" stroke="#ffffff" stroke-width="3"/>
    <!-- Keyhole -->
    <circle cx="0" cy="10" r="5" fill="#1d2420"/>
    <path d="M 0 15 L 0 24" stroke="#1d2420" stroke-width="3" stroke-linecap="round"/>
    <!-- Scan Circle -->
    <circle cx="0" cy="8" r="75" fill="none" stroke="#66c9a8" stroke-width="3" stroke-dasharray="10 8" opacity="0.6"/>
  </g>

  <!-- Input File Left (Large RAW/HEIC) -->
  <g transform="translate(85, 235) rotate(-8)" filter="url(#shadow)">
    <rect x="-35" y="-45" width="70" height="90" rx="10" fill="#ffffff" stroke="#1d2420" stroke-width="3"/>
    <!-- Red Accent thumbnail -->
    <rect x="-27" y="-37" width="54" height="44" rx="6" fill="#ffd7c8"/>
    <!-- Mountain sketch -->
    <path d="M -27 7 L -10 -10 L 10 7 L 18 0 L 27 7 Z" fill="#ef7f61" opacity="0.8"/>
    <!-- Skeleton text -->
    <rect x="-27" y="15" width="36" height="5" rx="2.5" fill="#66746d"/>
    <rect x="-27" y="25" width="22" height="4" rx="2" fill="#66746d" opacity="0.6"/>
  </g>

  <!-- Output File Right (Smaller JPEG) -->
  <g transform="translate(635, 245) rotate(8)" filter="url(#shadow)">
    <rect x="-25" y="-32" width="50" height="64" rx="8" fill="#ffffff" stroke="#1d2420" stroke-width="3"/>
    <!-- Green Accent thumbnail -->
    <rect x="-19" y="-26" width="38" height="30" rx="5" fill="#dcefe5"/>
    <path d="M -19 4 L -7 -8 L 5 4 L 11 -2 L 19 4 Z" fill="#1c7a61" opacity="0.8"/>
    <!-- Skeleton text -->
    <rect x="-19" y="11" width="24" height="4" rx="2" fill="#66746d"/>
  </g>

  <!-- Flow Arrows -->
  <path d="M 130 230 C 175 220, 195 200, 240 210" fill="none" stroke="#ef7f61" stroke-width="3" stroke-dasharray="8 6" stroke-linecap="round" opacity="0.8"/>
  <path d="M 230 200 L 242 211 L 228 218" fill="none" stroke="#ef7f61" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M 475 240 C 525 250, 550 250, 595 245" fill="none" stroke="#66c9a8" stroke-width="3" stroke-dasharray="8 6" stroke-linecap="round" opacity="0.8"/>
  <path d="M 585 236 L 597 245 L 585 254" fill="none" stroke="#66c9a8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
