<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" role="img" aria-labelledby="title desc">
  <title id="title">Choose output workflow illustration</title>
  <desc id="desc">A simplified settings window with format pills, a quality slider, and a destination folder.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f2f7f4"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#1a342b" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="560" rx="32" fill="url(#bg)"/>

  <!-- Output Settings Window -->
  <rect x="160" y="100" width="400" height="360" rx="24" fill="#ffffff" stroke="#1d2420" stroke-width="3" filter="url(#shadow)"/>
  
  <!-- Window Header -->
  <line x1="160" y1="155" x2="560" y2="155" stroke="#1d2420" stroke-width="3"/>
  <circle cx="190" cy="128" r="6" fill="#ef7f61" stroke="#1d2420" stroke-width="1.5"/>
  <circle cx="210" cy="128" r="6" fill="#f3c45d" stroke="#1d2420" stroke-width="1.5"/>
  <circle cx="230" cy="128" r="6" fill="#66c9a8" stroke="#1d2420" stroke-width="1.5"/>

  <!-- FORMAT Section -->
  <text x="190" y="190" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="12" fill="#66746d" letter-spacing="1.5">FORMAT</text>
  
  <!-- Selected JPG Pill -->
  <g transform="translate(190, 205)">
    <rect x="0" y="0" width="90" height="38" rx="19" fill="#66c9a8" stroke="#1d2420" stroke-width="3"/>
    <text x="45" y="24" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="14" fill="#1d2420" text-anchor="middle">JPG</text>
  </g>

  <!-- Unselected PNG Pill -->
  <g transform="translate(295, 205)">
    <rect x="0" y="0" width="90" height="38" rx="19" fill="#ffffff" stroke="#dcefe5" stroke-width="2"/>
    <text x="45" y="24" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="14" fill="#66746d" text-anchor="middle">PNG</text>
  </g>

  <!-- Unselected HEIC Pill -->
  <g transform="translate(400, 205)">
    <rect x="0" y="0" width="90" height="38" rx="19" fill="#ffffff" stroke="#dcefe5" stroke-width="2"/>
    <text x="45" y="24" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="14" fill="#66746d" text-anchor="middle">HEIC</text>
  </g>

  <!-- QUALITY Section -->
  <text x="190" y="280" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="12" fill="#66746d" letter-spacing="1.5">QUALITY</text>
  
  <!-- Slider Track -->
  <rect x="190" y="298" width="340" height="8" rx="4" fill="#dcefe5"/>
  <!-- Active Track -->
  <rect x="190" y="298" width="240" height="8" rx="4" fill="#66c9a8"/>
  <!-- Slider Handle -->
  <circle cx="430" cy="302" r="14" fill="#ffffff" stroke="#1d2420" stroke-width="3" filter="url(#shadow)"/>
  
  <!-- Value Tooltip -->
  <g transform="translate(405, 250)">
    <rect x="0" y="0" width="50" height="26" rx="6" fill="#1d2420"/>
    <path d="M 20 26 L 25 31 L 30 26 Z" fill="#1d2420"/>
    <text x="25" y="17" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="11" fill="#ffffff" text-anchor="middle">80%</text>
  </g>

  <!-- SAVE TO Section -->
  <text x="190" y="358" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="12" fill="#66746d" letter-spacing="1.5">SAVE TO</text>
  
  <!-- Folder Icon -->
  <g transform="translate(190, 375)">
    <!-- Folder body background -->
    <path d="M 0 6 H 18 L 24 12 H 44 V 36 H 0 Z" fill="#ffd1bf" stroke="#1d2420" stroke-width="3" stroke-linejoin="round"/>
    <!-- Folder front flap -->
    <path d="M 0 12 H 44 V 36 H 0 Z" fill="#ffbaa3" stroke="#1d2420" stroke-width="3" stroke-linejoin="round"/>
  </g>

  <!-- Destination Path Skeletons -->
  <rect x="250" y="382" width="180" height="8" rx="4" fill="#1d2420"/>
  <rect x="250" y="397" width="100" height="6" rx="3" fill="#66746d" opacity="0.6"/>
</svg>
