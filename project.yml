name: ImagePet
options:
  bundleIdPrefix: org.gewill
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
targets:
  ImagePetCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/ImagePetCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.gewill.ImagePetCore
        GENERATE_INFOPLIST_FILE: YES
  ImagePet:
    type: application
    platform: macOS
    sources:
      - path: Sources/ImagePet
        excludes:
          - Resources
      - path: Sources/ImagePet/Resources
        type: folder
    dependencies:
      - target: ImagePetCore
    info:
      path: Generated/Info.plist
      properties:
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleName: ImagePet
        CFBundleDisplayName: ImagePet
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: "13.0"
        NSPrincipalClass: NSApplication
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.gewill.ImagePet
        CODE_SIGN_ENTITLEMENTS: Entitlements/ImagePet.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_APP_SANDBOX: YES
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  ImagePetTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/ImagePetTests
    dependencies:
      - target: ImagePetCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.gewill.ImagePetTests
        GENERATE_INFOPLIST_FILE: YES
  ImagePetUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: Tests/ImagePetUITests
    dependencies:
      - target: ImagePet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.gewill.ImagePetUITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: ImagePet
schemes:
  ImagePet:
    build:
      targets:
        ImagePet: all
        ImagePetTests: [test]
        ImagePetUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ImagePetTests
        - ImagePetUITests
